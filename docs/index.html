<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Endless Werewolf — AI One Night Showcase</title>
<meta name="description" content="Watch 6 AI agents play One Night Ultimate Werewolf in a 3D village. Night actions, live debate, voting, and postgame interviews.">
<link rel="icon" type="image/x-icon" href="./favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>

<canvas id="c"></canvas>

<!-- Name tags layer -->
<div id="tags"></div>
<!-- Speech bubbles layer -->
<div id="bubbles"></div>
<!-- Vote arrows layer -->
<div id="vote-overlay"></div>

<!-- Top bar -->
<div id="topbar">
  <div class="brand">Endless Werewolf <span class="sub">AI One Night</span></div>
  <div class="top-actions">
    <button class="btn" id="btn-lang">中文</button>
    <button class="btn" id="btn-gallery">Characters</button>
    <button class="btn" id="btn-archive">Archive</button>
    <button class="btn" id="btn-info">Info</button>
    <button class="btn" id="btn-night">Night</button>
    <button class="btn active" id="btn-rotate">Auto-rotate</button>
    <a class="btn" id="btn-github" href="https://github.com/ShawTim/endless-werewolf" target="_blank">GitHub</a>
  </div>
</div>

<!-- Phase Timeline -->
<div id="timeline">
  <div class="phase-step" data-phase="night">
    <span class="label">Night</span>
  </div>
  <div class="phase-step" data-phase="day">
    <span class="label">Debate</span>
  </div>
  <div class="phase-step" data-phase="vote">
    <span class="label">Vote</span>
  </div>
  <div class="phase-step" data-phase="resolve">
    <span class="label">Resolve</span>
  </div>
  <div class="phase-step" data-phase="postgame">
    <span class="label">Postgame</span>
  </div>
</div>

<!-- Replay controls -->
<div id="replay-controls">
  <button class="btn" id="btn-prev">⏮</button>
  <button class="btn" id="btn-play">▶</button>
  <button class="btn" id="btn-next">⏭</button>
  <span class="progress" id="replay-progress">0 / 0</span>
</div>

<!-- Game archive panel -->
<div id="archive-panel">
  <button class="close-btn" id="btn-archive-close">✕</button>
  <div style="padding:50px 16px 16px;">
    <h3 style="color:var(--gold);font-size:14px;margin-bottom:12px;">Game Archive</h3>
    <div id="archive-list"></div>
  </div>
</div>

<!-- Side panel (game / player details) -->
<div id="side-panel">
  <button class="close-btn" id="btn-panel-close">✕</button>
  <div id="panel-content"></div>
</div>

<!-- Hover card -->
<div id="hover-card"></div>

<!-- Result banner -->
<div id="result-banner">
  <div class="title"></div>
  <div class="sub"></div>
  <div class="winners"></div>
</div>

<!-- Small player modal (click character) -->
<div id="player-modal">
  <div id="player-modal-content"></div>
  <button id="player-modal-close" class="modal-close-btn">✕</button>
</div>

<!-- Large character gallery modal (button) -->
<div id="gallery-modal">
  <div id="gallery-modal-box">
    <div id="gallery-modal-left">
      <canvas id="gallery-3d"></canvas>
      <button id="gallery-prev" class="gallery-nav-btn">‹</button>
      <button id="gallery-next" class="gallery-nav-btn">›</button>
    </div>
    <div id="gallery-modal-right">
      <button id="gallery-modal-close" class="modal-close-btn">✕</button>
      <div id="gallery-modal-tabs">
        <div class="modal-tab active" data-tab="persona">Persona</div>
        <div class="modal-tab" data-tab="game">Game</div>
      </div>
      <div id="gallery-modal-content"></div>
    </div>
  </div>
</div>

<!-- Loading -->
<div id="loading">Loading 3D village…</div>

<!-- Welcome overlay -->
<div id="welcome-overlay">
  <div id="welcome-card">
    <div id="welcome-title">Endless Werewolf</div>
    <div id="welcome-sub">AI One Night</div>
    <div id="welcome-desc">6 AI agents. Different LLMs. Autonomous decisions.</div>
    <button id="welcome-btn">Enter</button>
    <a id="welcome-gh" href="https://github.com/ShawTim/endless-werewolf" target="_blank">GitHub</a>
  </div>
</div>

<!-- Controls hint -->
<div id="controls-hint"></div>

<script type="module" src="./app.js"></script>
</body>
</html>
